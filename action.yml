name: 'Slack Workflow Notifications'
author: 'Anthony Kinson'
description: 'A Github Action for sending Workflow run results to Slack'
branding:
  icon: message-square
  color: blue
inputs:
  repo_token:
    description: 'You must manually pass in secrets.GITHUB_TOKEN'
    required: true
  slack_webhook_url:
    description: |
      Slack Incoming Webhook URL. Provide either this or `slack_bot_token`
      (not both). Recommended source: a repository secret named
      `SLACK_WEBHOOK_URL` referenced from your workflow.
    required: false
  slack_bot_token:
    description: |
      Slack Bot User OAuth Token (`xoxb-…`) for posting via the Web API.
      Provide either this or `slack_webhook_url` (not both). When set,
      `channel` is required. The Slack app needs `chat:write` (and
      `chat:write.public` to post in channels the bot isn't a member of).
      Falls back to the `SLACK_BOT_TOKEN` env var when this input is empty.
    required: false
  channel:
    description: |
      Where to post the notification. With `slack_webhook_url`, overrides
      the default channel attached to the webhook (workspace permitting).
      With `slack_bot_token`, this is required and accepts a channel name
      (`#release`), channel ID (`C0123…`), or user ID (`U0123…`) for DMs.
    required: false
  name:
    description: 'Override the default name configured by the Slack SLACK_WEBHOOK_URL'
    required: false
  icon_emoji:
    description: 'Override the default webhook icon with an emoji. Uses emoji code: https://www.webfx.com/tools/emoji-cheat-sheet/'
    required: false
  icon_url:
    description: 'Override the default webhook icon with an image via url.'
    required: false
  include_jobs:
    description: 'Should the slack notification include individual job status and run times'
    required: true
    default: 'true'
  hide_job_statuses:
    description: |
      Comma-separated list of job conclusions to omit from the rendered job
      list (e.g. "skipped" or "skipped,cancelled"). The overall workflow
      color/text still reflects all jobs. Default is "" (no filtering).
    required: false
    default: ''
  extra_text:
    description: |
      Free-form text appended to the notification body. Useful for adding a
      deploy URL, ticket link, channel mention, or any other context that
      should travel with the message. Default is "" (nothing appended).
    required: false
    default: ''
  include_commit_message:
    description: 'Should the slack notification include the head commit message'
    required: true
    default: "false"
  jobs_to_fetch:
    description: 'Number of jobs to fetch (for workflows with big number of jobs)'
    required: false
    default: '30'
  workflow_run:
    description: 'Set to "true" when this action runs in a workflow triggered by the workflow_run event, to report on the upstream workflow rather than the current one.'
    required: false
    default: 'false'
runs:
  using: 'node24'
  main: 'dist/index.js'
