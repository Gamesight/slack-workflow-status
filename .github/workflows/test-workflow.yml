  slack-notify-failure:
    if: always()
    needs: [job-1, job-2, e2e-test-1, e2e-test-2]
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack Notification
        uses: midleman/slack-workflow-status@mi/add-filter-jobs # for testing changes, use branch instead of version #
        with:
          gh_repo_token: ${{ secrets.GITHUB_TOKEN }}
          slack_token: ${{ secrets.SLACK_TOKEN }}
          slack_channel: "U07KNKY6S5C"
          notify_on: "failure"
          filter_jobs: "e2e-test-1, e2e-test-2" # will only send notification for these jobs failing


